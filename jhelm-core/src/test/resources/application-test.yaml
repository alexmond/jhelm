jhelmtest:
  number-of-top-charts: 5
  comparison-ignores:
    _global:
      # Checksum annotations — different hash computation
      - resource: "*"
        path: "spec.template.metadata.annotations.checksum.*"
        reason: "JHelm sha256sum/toYaml produce different checksums than Helm"
      # Secret data — randomized or differently-encoded values
      - resource: "Secret/*"
        path: "data.*"
        reason: "Secret data contains generated passwords/certs that differ between runs"
    "[bitnami/rabbitmq]":
      - resource: "Service/*"
        path: "spec.trafficDistribution"
        reason: "trafficDistribution field rendered by JHelm but absent in Helm output"
    "[nextcloud/nextcloud]":
      # Hash annotation computed differently (not checksum.* pattern)
      - resource: "Deployment/*"
        path: "spec.template.metadata.annotations.*"
        reason: "nextcloud-config-hash uses sha256sum with different intermediate output"
    "[istio-official/istiod]":
      # Library chart pattern — 5 resources not rendered
      - resource: "*"
        path: "*"
        reason: "Library chart rendering gap — 5 resources missing (#200)"
    "[gitea/gitea]":
      # Subchart value propagation — connection strings still empty
      - resource: "Secret/*"
        path: "stringData.*"
        reason: "Subchart value propagation gap — tpl-based connection strings empty (#201)"
      - resource: "Service/*"
        path: "spec.ports.*"
        reason: "Service targetPort rendered as 3000 instead of null"
    "[datadog/datadog]":
      # Operator subchart resources missing + random UUID
      - resource: "*"
        path: "*"
        reason: "9 operator subchart resources missing + random install_id UUID (#202)"
