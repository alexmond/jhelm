jhelmtest:
  number-of-top-charts: 5
  comparison-ignores:
    _global:
      # Secret data — randomized or differently-encoded values
      - resource: "Secret/*"
        path: "data.*"
        reason: "Secret data contains generated passwords/certs that differ between runs"
      # Checksum annotations — include renders templates inline and sha256sums
      # the raw output. Generated secrets, certs, and toYaml serialization diffs
      # cause hash mismatches even when final documents are functionally identical
      - resource: "*"
        path: "spec.template.metadata.annotations.checksum/*"
        reason: "Checksum annotations differ due to generated secrets/certs and toYaml serialization diffs (#237)"
      # Generated TLS certificates (genCA/genSignedCert) differ between runs
      - resource: "ValidatingWebhookConfiguration/*"
        path: "webhooks.*"
        reason: "TLS certificates are generated per render via genCA/genSignedCert"
      - resource: "MutatingWebhookConfiguration/*"
        path: "webhooks.*"
        reason: "TLS certificates are generated per render via genCA/genSignedCert"
    "[gitea/gitea]":
      # Subchart stringData still missing — tpl-based config_environment.sh not rendered
      - resource: "Secret/*"
        path: "stringData.*"
        reason: "Subchart value propagation gap — tpl-based config scripts missing (#201)"
    "[datadog/datadog]":
      # Random UUID generated per render — always different between Helm and JHelm
      - resource: "ConfigMap/*"
        path: "data.install_id"
        reason: "install_id is a random UUID generated per render"
      # Unix timestamp of the render — the Helm and JHelm renders happen seconds apart
      - resource: "ConfigMap/*"
        path: "data.install_time"
        reason: "install_time is the render Unix timestamp; differs by seconds between the two renders"
    "[ananace-charts/matrix-synapse]":
      # registration_shared_secret is generated per render (randAlphaNum)
      - resource: "Secret/*"
        path: "stringData.config.yaml.registration_shared_secret"
        reason: "Randomly generated per render"
    "[elastic/elasticsearch]":
      # The Helm test-hook Pod has a random name suffix (randAlphaNum) that differs
      # every render, so the resource key never matches.
      - resource: "Pod/*"
        path: "*"
        reason: "helm test-hook Pod has a per-render random name suffix"
    "[jenkins/jenkins]":
      # The jenkins-ui-test Helm test-hook Pod has a random name suffix that differs
      # every render, so the resource key never matches.
      - resource: "Pod/*"
        path: "*"
        reason: "helm test-hook Pod has a per-render random name suffix"
    "[nextcloud/nextcloud]":
      # hooks-hash is a sha256 of hooked content; differs only by toYaml serialization
      # (same class as checksum/* annotations, #237).
      - resource: "Deployment/*"
        path: "spec.template.metadata.annotations.hooks-hash"
        reason: "content hash differs by toYaml serialization, not semantics (#237)"
    "[cetic/nifi]":
      # flow.xml embeds uuidv4-generated registry/rootGroup ids that differ every render.
      - resource: "ConfigMap/*"
        path: "data.flow.xml"
        reason: "flow.xml contains uuidv4-generated ids regenerated per render"
    "[kiali/kiali-server]":
      # login_token.signing_key is a per-render randAlphaNum secret.
      - resource: "ConfigMap/*"
        path: "data.config.yaml.login_token.signing_key"
        reason: "signing_key is a randAlphaNum value regenerated per render"
    "[agones/agones]":
      # caBundle is a genCA/genSignedCert TLS cert, regenerated per render (same
      # class as the webhook TLS certs ignored globally above).
      - resource: "APIService/*"
        path: "spec.caBundle"
        reason: "caBundle is a generated TLS cert that differs every render"
    "[cetic/fadi]":
      # nifi flow.xml ids are `{{ default uuidv4 }}` — generated per render with no value
      # to pin them, so the only option is to ignore the field.
      - resource: "ConfigMap/*"
        path: "data.flow.xml"
        reason: "flow.xml ids come from `default uuidv4` (not settable); regenerated per render"
    "[fairwinds/aws-iam-authenticator]":
      # The DaemonSet's checksum/config hashes the inlined ConfigMap via include|sha256sum;
      # the ConfigMap itself renders byte-for-byte identical to Helm, so the hash differs
      # only by intermediate toYaml serialization (#237). The _global rule covers
      # spec.template.* checksums; this chart puts it at the top-level metadata.
      - resource: "DaemonSet/*"
        path: "metadata.annotations.checksum/config"
        reason: "checksum of an inlined ConfigMap that matches Helm byte-for-byte; differs only by toYaml serialization (#237)"
    "[timescale/timescaledb-single]":
      # The certificate Secret holds a genSignedCert TLS cert/key and the credentials
      # Secret holds randAlphaNum passwords — both regenerated per render.
      - resource: "Secret/release-timescale-timescaledb-single-certificate"
        path: "stringData.*"
        reason: "TLS cert/key generated per render"
      - resource: "Secret/release-timescale-timescaledb-single-credentials"
        path: "stringData.*"
        reason: "Patroni passwords are randAlphaNum, generated per render"
    "[redpanda/console]":
      # The JWT signing key defaults to randAlphaNum 32 when unset (chart.DotToState),
      # so Helm and jhelm each generate a different value every render.
      - resource: "Secret/*"
        path: "stringData.authentication-jwt-signingkey"
        reason: "JWT signing key is a randAlphaNum value generated per render"
    "[grafana/oncall]":
      # The migrate Job name embeds `now | date` (job-migrate.yaml), so Helm and jhelm
      # each produce a different timestamp suffix and the resource key never matches.
      - resource: "Job/release-grafana-oncall-engine-migrate-*"
        path: "*"
        reason: "migrate Job name has a per-render now-timestamp suffix"
    "[fairwinds/fairwinds-insights]":
      # CACHE_BUST_TOKEN env value is `{{ randAlphaNum 10 }}` (_env.yaml) — not settable;
      # Helm and jhelm each generate a different 10-char token, repeated across every
      # workload that includes the shared env block (Deployments/Jobs and CronJobs).
      # The "[*]" glob targets the env value field at any container/env index without
      # masking other container fields.
      - resource: "*"
        path: "spec.template.spec.containers[*].env[*].value"
        reason: "CACHE_BUST_TOKEN is randAlphaNum (not settable); regenerated per render"
      - resource: "*"
        path: "spec.jobTemplate.spec.template.spec.containers[*].env[*].value"
        reason: "CACHE_BUST_TOKEN is randAlphaNum (not settable); regenerated per render"
      # Admission-webhook Secret holds a genSignedCert TLS cert/key, regenerated per render
      # (same class as the webhook TLS certs ignored globally above).
      - resource: "Secret/*"
        path: "stringData.tls.*"
        reason: "TLS cert/key generated per render via genSignedCert"
  # Value overrides for charts that Helm cannot render with default values. The same
  # overrides are applied to both Helm and jhelm, so any divergence is a real jhelm bug.
  comparison-values:
    # cerebro generates `secret = randAlphaNum 64` only when config.secret is empty;
    # pinning it makes the application.conf ConfigMap deterministic (and validated).
    "[stakater/cerebro]":
      config:
        secret: parity-fixed-cerebro-secret
    # linkerd-viz's tap APIService caBundle is genSelfSignedCert unless tap.caBundle is
    # set; pinning it renders a stable caBundle (the per-render tls.crt/key stay in a
    # Secret, which is ignored globally).
    "[linkerd/linkerd-viz]":
      tap:
        # caBundle requires externalSecret (the chart rejects caBundle without it).
        externalSecret: true
        caBundle: |
          -----BEGIN CERTIFICATE-----
          MIIBparityfixedcabundleforcomparisononlynotarealcertificateAAAAAA
          -----END CERTIFICATE-----
    # mongodb atlas charts render `password | default (randAlphaNum 32 | b64enc)`;
    # pinning the password makes the admin-user Secret deterministic (and validated).
    "[mongodb/atlas-basic]":
      dbUser:
        password: parity-fixed-atlas-password
    "[mongodb/atlas-advanced]":
      dbUser:
        password: parity-fixed-atlas-password
    "[mongodb/atlas-deployment]":
      users:
        - username: admin-user
          databaseName: admin
          password: parity-fixed-atlas-password
          roles:
            - databaseName: admin
              roleName: atlasAdmin
    "[mongodb/atlas-cluster]":
      users:
        - username: admin-user
          databaseName: admin
          password: parity-fixed-atlas-password
          roles:
            - databaseName: admin
              roleName: atlasAdmin
    # chainloop's generated_jws_hmac_secret derives from controlplane.auth.passphrase
    # (common.secrets.passwords.manage providedValues); pinning it makes the Secret stable.
    "[bitnami/chainloop]":
      controlplane:
        auth:
          passphrase: parity-fixed-chainloop-passphrase
    "[aws/aws-load-balancer-controller]":
      clusterName: test-cluster
    "[rancher-stable/rancher]":
      hostname: rancher.example.com
    "[immich/immich]":
      immich:
        persistence:
          library:
            existingClaim: test-claim
    "[opentelemetry-helm/opentelemetry-collector]":
      mode: deployment
      image:
        repository: otel/opentelemetry-collector-contrib
      command:
        name: otelcol-contrib
    "[ananace-charts/matrix-synapse]":
      serverName: matrix.example.com
      config:
        reportStats: false
    "[prometheus-community/prometheus-postgres-exporter]":
      config:
        datasource:
          password: test
    "[drone/drone]":
      env:
        DRONE_SERVER_HOST: drone.example.com
        DRONE_SERVER_PROTO: https
        DRONE_RPC_SECRET: testsecret
    "[sonarqube/sonarqube]":
      monitoringPasscode: testpass123
      community:
        enabled: true
    "[grafana/loki]":
      loki:
        useTestSchema: true
        storage:
          type: filesystem
      deploymentMode: SingleBinary
      singleBinary:
        replicas: 1
      read:
        replicas: 0
      write:
        replicas: 0
      backend:
        replicas: 0
      chunksCache:
        enabled: false
      resultsCache:
        enabled: false
    "[grafana/k8s-monitoring]":
      cluster:
        name: test-cluster
      destinations:
        loki:
          type: loki
          url: http://loki.example.com/loki/api/v1/push
      clusterEvents:
        enabled: true
        collector: alloy-singleton
      collectors:
        alloy-singleton:
          enabled: true
    "[gitlab/gitlab]":
      global:
        hosts:
          domain: example.com
        redis:
          host: redis.example.com
          password:
            enabled: false
        psql:
          host: postgresql.example.com
          password:
            secret: gitlab-postgresql-password
            key: postgresql-password
        appConfig:
          object_store:
            enabled: true
            connection:
              secret: gitlab-object-storage
              key: connection
        registry:
          bucket: registry
        minio:
          enabled: false
      certmanager-issuer:
        email: test@example.com
      registry:
        storage:
          secret: gitlab-registry-storage
          key: config
      gitlab:
        toolbox:
          backups:
            objectStorage:
              config:
                secret: gitlab-backup-storage
                key: config
    "[nfs-subdir-external-provisioner/nfs-subdir-external-provisioner]":
      nfs:
        server: 10.0.0.1
        path: /exported/path
