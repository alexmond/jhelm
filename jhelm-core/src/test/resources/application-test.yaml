jhelmtest:
  number-of-top-charts: 5
  comparison-ignores:
    _global:
      # Checksum annotations — different hash computation
      - resource: "*"
        path: "spec.template.metadata.annotations.checksum.*"
        reason: "JHelm sha256sum/toYaml produce differeaddd my changess to pr nt checksums than Helm"
      # Secret data — randomized or differently-encoded values
      - resource: "Secret/*"
        path: "data.*"
        reason: "Secret data contains generated passwords/certs that differ between runs"
      # Subchart defaults merging — JHelm exposes values that Helm omits
      - resource: "*"
        path: "spec.trafficDistribution"
        reason: "Subchart defaults merging exposes values that Helm omits"
    "[prometheus-community/prometheus]":
      # Prometheus ConfigMap — JHelm double-quotes regex values
      - resource: "ConfigMap/*"
        path: "data.prometheus.yml"
        reason: "JHelm double-quotes regex values with backslash escapes in embedded YAML"
