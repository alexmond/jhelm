name: Maven Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version'
        required: true
      nextVersion:
        description: 'Next development version (with -SNAPSHOT suffix)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          server-id: central
          server-username: OSSRH_USERNAME
          server-password: OSSRH_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Set Release Version
        run: ./mvnw versions:set -DnewVersion=${{ github.event.inputs.releaseVersion }} --no-transfer-progress

      - name: Verify Build
        run: ./mvnw --batch-mode clean verify --no-transfer-progress

      - name: Commit and Tag Release
        run: |
          git commit -am "Prepare release ${{ github.event.inputs.releaseVersion }}"
          git tag -a ${{ github.event.inputs.releaseVersion }} -m "Release ${{ github.event.inputs.releaseVersion }}"

      - name: Deploy to Maven Central
        run: ./mvnw --batch-mode clean deploy -Prelease --no-transfer-progress
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          # maven-gpg-plugin 3.x reads the passphrase from this env var (batch mode with
          # --pinentry-mode loopback), avoiding the deprecated -Dgpg.passphrase property.
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Set Next Development Version
        run: |
          ./mvnw versions:set -DnewVersion=${{ github.event.inputs.nextVersion }} --no-transfer-progress
          git commit -am "Prepare for next development iteration: ${{ github.event.inputs.nextVersion }}"

      - name: Push Changes
        run: git push && git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.releaseVersion }}
          name: Release ${{ github.event.inputs.releaseVersion }}
          generate_release_notes: true
          # The CLI is not published to Central (it is a fat jar, not a library);
          # attach it here so users have a downloadable runnable jar per release.
          files: jhelm-cli/target/jhelm-${{ github.event.inputs.releaseVersion }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
