# Access mode for the standalone CLI. Unlike the network-exposed REST/MCP adapters —
# which stay READ_ONLY + api-key by default (deny-by-default for a listening server) —
# the CLI defaults to FULL, so install/upgrade/uninstall/rollback/test work out of the
# box just like `helm`. The local kubeconfig (and the cluster's RBAC) is the trust
# boundary. Set jhelm.security.mode=READ_ONLY to lock a CLI down (shared workstation,
# agent guardrail); that posture is enforced by MutatingGuard, not just logged.
jhelm.security.mode=FULL

# picocli-spring's PicocliSpringFactory logs a benign INFO line via java.util.logging
# whenever it asks the Spring context for a type it doesn't manage — e.g. the backing
# List for a multi-value option like `--set` — then transparently falls back to picocli's
# own factory ("Unable to get bean of class interface java.util.List ... using fallback
# factory"). The fallback works and the command runs fine, but the message reads like an
# error/stacktrace on every such invocation. Quiet that one logger to WARN.
logging.level.picocli.spring=WARN

# The jhelm banner is printed explicitly to stderr by JHelmCommand when invoked
# with no subcommand, so that command output on stdout (e.g. `jhelm template`
# piped to a file) stays clean. Disable Spring's automatic stdout banner here.
spring.main.banner-mode=off

# Lazy bean initialization: a CLI invocation only exercises the beans for the one
# command being run, so eagerly instantiating the whole context (chart engine,
# repo/registry managers, kube client, ...) on every startup is wasted work. Lazy
# init defers each bean to first use, roughly halving Spring context startup (a
# trivial command such as `jhelm version` goes from ~4.2s to ~2.1s of context
# init). Errors from a misconfigured bean now surface when the command that needs
# it runs, rather than at startup — which is the desired behavior for a CLI.
spring.main.lazy-initialization=true

# Skip auto-configurations a one-shot CLI never uses, so Spring doesn't parse
# their @Configuration classes or evaluate their conditions at startup:
#   - task execution / scheduling — jhelm has no @Async / @Scheduled beans, and
#     AsyncKubeService uses its own virtual-thread executor, not a Spring one;
#   - application availability — liveness/readiness state is for long-running
#     web/k8s workloads, not a CLI;
#   - AOP — jhelm defines no aspects.
# Measured together with lazy-init on `jhelm version`: ~5.45s -> ~3.25s startup.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.task.TaskExecutionAutoConfiguration,\
  org.springframework.boot.autoconfigure.task.TaskSchedulingAutoConfiguration,\
  org.springframework.boot.autoconfigure.availability.ApplicationAvailabilityAutoConfiguration,\
  org.springframework.boot.autoconfigure.aop.AopAutoConfiguration
